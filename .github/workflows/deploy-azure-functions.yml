name: Deploy to Azure Functions

permissions:
  contents: read

on:
  push:
    branches:
      - master
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to redeploy
        required: true
        type: choice
        options:
          - dev
          - prod

env:
  DOTNET_VERSION: "10.0.x"
  FUNCTION_PROJECT: src/YoloFunk/YoloFunk.csproj

jobs:
  select-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.select.outputs.environment }}
      github-environment: ${{ steps.select.outputs.github-environment }}
      hyperliquid-network: ${{ steps.select.outputs.hyperliquid-network }}
    steps:
      - name: Select and validate environment
        id: select
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            ENVIRONMENT="prod"
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            ENVIRONMENT="dev"
          else
            echo "Unsupported deployment ref: ${{ github.ref }}"
            exit 1
          fi

          if [[ "$ENVIRONMENT" == "prod" ]]; then
            EXPECTED_REF="refs/heads/master"
            GITHUB_ENVIRONMENT="production"
            NETWORK="mainnet"
          else
            EXPECTED_REF="refs/heads/develop"
            GITHUB_ENVIRONMENT="development"
            NETWORK="testnet"
          fi

          if [[ "${{ github.ref }}" != "$EXPECTED_REF" ]]; then
            echo "Ref ${{ github.ref }} cannot deploy environment $ENVIRONMENT; select $EXPECTED_REF."
            exit 1
          fi

          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "github-environment=$GITHUB_ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "hyperliquid-network=$NETWORK" >> "$GITHUB_OUTPUT"

  deploy:
    needs: select-environment
    runs-on: ubuntu-latest
    environment: ${{ needs.select-environment.outputs.github-environment }}
    env:
      DEPLOYMENT_ENVIRONMENT: ${{ needs.select-environment.outputs.environment }}
      HYPERLIQUID_NETWORK: ${{ needs.select-environment.outputs.hyperliquid-network }}
      PUBLISH_DIR: ${{ github.workspace }}/publish
    steps:
      - name: Checkout exact deployment commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Verify deployment commit
        shell: bash
        run: |
          CHECKED_OUT_SHA=$(git rev-parse HEAD)
          if [[ "$CHECKED_OUT_SHA" != "${{ github.sha }}" ]]; then
            echo "Checked out $CHECKED_OUT_SHA, expected ${{ github.sha }}"
            exit 1
          fi
          echo "Deploying $CHECKED_OUT_SHA to $DEPLOYMENT_ENVIRONMENT"

      - name: Verify production promotion source
        if: env.DEPLOYMENT_ENVIRONMENT == 'prod'
        shell: bash
        run: |
          if ! SECOND_PARENT=$(git rev-parse "${{ github.sha }}^2" 2>/dev/null); then
            echo "Production commits must be merge commits from a develop release PR."
            exit 1
          fi

          git fetch origin develop
          if ! git merge-base --is-ancestor "$SECOND_PARENT" origin/develop; then
            echo "The production merge commit's source is not part of develop."
            exit 1
          fi

      - name: Validate environment configuration
        shell: bash
        run: |
          for variable in AZURE_RESOURCE_GROUP AZURE_LOCATION AZURE_KEYVAULT_NAME; do
            if [[ -z "${!variable}" ]]; then
              echo "Missing GitHub environment variable: $variable"
              exit 1
            fi
          done
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_KEYVAULT_NAME: ${{ vars.AZURE_KEYVAULT_NAME }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.FUNCTION_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.FUNCTION_PROJECT }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.FUNCTION_PROJECT }} --configuration Release --no-build --output ${{ env.PUBLISH_DIR }}

      - name: Verify publish output
        shell: bash
        run: |
          test -f "$PUBLISH_DIR/host.json"
          test -f "$PUBLISH_DIR/functions.metadata"
          test -f "$PUBLISH_DIR/worker.config.json"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --location "${{ vars.AZURE_LOCATION }}" \
            --tags Environment="$DEPLOYMENT_ENVIRONMENT" ManagedBy=GitHub

      - name: Deploy environment Key Vault
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file .azure/key-vault.bicep \
            --parameters \
              keyVaultName="${{ vars.AZURE_KEYVAULT_NAME }}" \
              environmentName="$DEPLOYMENT_ENVIRONMENT" \
              location="${{ vars.AZURE_LOCATION }}"

      - name: Verify Key Vault role-assignment permissions
        shell: bash
        run: |
          KEYVAULT_ID=$(az keyvault show \
            --name "${{ vars.AZURE_KEYVAULT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query id --output tsv)

          SP_CLIENT_ID=$(az account show --query user.name --output tsv)
          SP_OBJECT_ID=$(az ad sp show --id "$SP_CLIENT_ID" --query id --output tsv)
          ROLE=$(az role assignment list \
            --assignee "$SP_OBJECT_ID" \
            --scope "$KEYVAULT_ID" \
            --include-inherited \
            --query "[?roleDefinitionName=='User Access Administrator' || roleDefinitionName=='Owner'].id | [0]" \
            --output tsv)

          if [[ -z "$ROLE" ]]; then
            echo "The deployment identity cannot manage role assignments on this environment's Key Vault."
            exit 1
          fi

      - name: Deploy environment monitoring
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file .azure/app-insights.bicep \
            --parameters location="${{ vars.AZURE_LOCATION }}" environmentName="$DEPLOYMENT_ENVIRONMENT"

      - name: Deploy Function App infrastructure
        id: infrastructure
        shell: bash
        run: |
          OUTPUT=$(az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file .azure/function-app.bicep \
            --parameters \
              environmentName="$DEPLOYMENT_ENVIRONMENT" \
              location="${{ vars.AZURE_LOCATION }}" \
              hyperliquidNetwork="$HYPERLIQUID_NETWORK" \
              keyVaultName="${{ vars.AZURE_KEYVAULT_NAME }}" \
            --query properties.outputs \
            --output json)

          echo "function-app-name=$(jq -r '.functionAppName.value' <<< "$OUTPUT")" >> "$GITHUB_OUTPUT"
          echo "principal-id=$(jq -r '.principalId.value' <<< "$OUTPUT")" >> "$GITHUB_OUTPUT"

      - name: Grant Function App access to its Key Vault
        shell: bash
        run: |
          KEYVAULT_ID=$(az keyvault show \
            --name "${{ vars.AZURE_KEYVAULT_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query id --output tsv)
          PRINCIPAL_ID="${{ steps.infrastructure.outputs.principal-id }}"
          EXISTING=$(az role assignment list \
            --scope "$KEYVAULT_ID" \
            --role "Key Vault Secrets User" \
            --query "[?principalId=='$PRINCIPAL_ID'].id | [0]" \
            --output tsv)

          if [[ -n "$EXISTING" ]]; then
            exit 0
          fi

          for attempt in {1..12}; do
            if az role assignment create \
              --assignee-object-id "$PRINCIPAL_ID" \
              --assignee-principal-type ServicePrincipal \
              --role "Key Vault Secrets User" \
              --scope "$KEYVAULT_ID"; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Deploy production alert rules
        if: env.DEPLOYMENT_ENVIRONMENT == 'prod' && vars.ALERT_EMAIL != ''
        run: |
          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file .azure/alert-rules.bicep \
            --parameters \
              functionAppName="${{ steps.infrastructure.outputs.function-app-name }}" \
              alertEmail="${{ vars.ALERT_EMAIL }}" \
              location="${{ vars.AZURE_LOCATION }}"

      - name: Deploy application
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.infrastructure.outputs.function-app-name }}
          package: ${{ env.PUBLISH_DIR }}

      - name: Smoke test
        id: smoke-test
        shell: bash
        run: |
          HOSTNAME=$(az functionapp show \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ steps.infrastructure.outputs.function-app-name }}" \
            --query defaultHostName --output tsv)

          for attempt in {1..12}; do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "https://$HOSTNAME/admin/functions")
            if [[ "$STATUS" == "200" || "$STATUS" == "401" ]]; then
              echo "url=https://$HOSTNAME" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "## Deployment complete"
            echo "- Environment: $DEPLOYMENT_ENVIRONMENT"
            echo "- Commit: ${{ github.sha }}"
            echo "- Function App: ${{ steps.infrastructure.outputs.function-app-name }}"
            echo "- URL: ${{ steps.smoke-test.outputs.url }}"
            echo "- Hyperliquid network: $HYPERLIQUID_NETWORK"
          } >> "$GITHUB_STEP_SUMMARY"
