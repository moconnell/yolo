name: Cleanup Azure Functions

permissions: {}

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to cleanup (pr-{number}, feat-{name}, or dev)"
        required: true
        type: string
      principal_id:
        description: "Optional managed identity principal/object id to remove from Key Vault if the app was already deleted"
        required: false
        type: string

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'ResourceGroup1' }}
  AZURE_KEYVAULT_NAME: ${{ vars.AZURE_KEYVAULT_NAME || 'YOLO' }}

jobs:
  cleanup:
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Determine environment to cleanup
        id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
            PRINCIPAL_ID="${{ github.event.inputs.principal_id }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            ENV="pr-${{ github.event.pull_request.number }}"
            PRINCIPAL_ID=""
          else
            echo "Unknown event type"
            exit 1
          fi

          # Never allow cleanup of production
          if [ "$ENV" = "prod" ]; then
            echo "❌ Cannot cleanup production environment via automation"
            exit 1
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "function-app-name=yolo-funk-$ENV" >> $GITHUB_OUTPUT
          echo "principal_id=$PRINCIPAL_ID" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete Function App and related resources
        run: |
          FUNCTION_APP_NAME="${{ steps.set-env.outputs.function-app-name }}"
          ENV="${{ steps.set-env.outputs.environment }}"
          INPUT_PRINCIPAL_ID="${{ steps.set-env.outputs.principal_id }}"

          remove_keyvault_assignment() {
            local principal_id="$1"

            if [ -z "$principal_id" ] || [ "$principal_id" = "null" ]; then
              echo "No managed identity principal id available for Key Vault role cleanup"
              return 0
            fi

            if [ -z "${{ env.AZURE_KEYVAULT_NAME }}" ]; then
              echo "No Key Vault configured, skipping role assignment cleanup"
              return 0
            fi

            KEYVAULT_ID=$(az keyvault show \
              --name "${{ env.AZURE_KEYVAULT_NAME }}" \
              --query id \
              --output tsv 2>/dev/null || true)

            if [ -z "$KEYVAULT_ID" ]; then
              echo "Key Vault ${{ env.AZURE_KEYVAULT_NAME }} not found, skipping role assignment cleanup"
              return 0
            fi

            ASSIGNMENT_IDS=$(az role assignment list \
              --scope "$KEYVAULT_ID" \
              --role "Key Vault Secrets User" \
              --query "[?principalId=='$principal_id'].id" \
              --output tsv)

            if [ -z "$ASSIGNMENT_IDS" ]; then
              echo "No Key Vault Secrets User assignment found for principal $principal_id"
              return 0
            fi

            for assignment_id in $ASSIGNMENT_IDS; do
              echo "Deleting Key Vault role assignment: $assignment_id"
              az role assignment delete --ids "$assignment_id"
            done
          }

          # Check if Function App exists
          if az functionapp show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name $FUNCTION_APP_NAME 2>/dev/null; then
            
            echo "Deleting Function App: $FUNCTION_APP_NAME"
            
            # Get associated resources (App Service Plan name from resource ID)
            PLAN_ID=$(az functionapp show \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name $FUNCTION_APP_NAME \
              --query 'appServicePlanId' \
              --output tsv)

            PRINCIPAL_ID=$(az functionapp show \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name $FUNCTION_APP_NAME \
              --query 'identity.principalId' \
              --output tsv)
            
            # Extract plan name from resource ID (format: /subscriptions/.../serverfarms/PLAN_NAME)
            if [ -n "$PLAN_ID" ]; then
              PLAN_NAME=$(echo "$PLAN_ID" | awk -F'/' '{print $NF}')
            else
              PLAN_NAME="${FUNCTION_APP_NAME}-plan"
            fi
            
            echo "App Service Plan: $PLAN_NAME"

            # Delete Key Vault permission before deleting the system-assigned identity.
            remove_keyvault_assignment "$PRINCIPAL_ID"
            
            # Delete Function App
            az functionapp delete \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name $FUNCTION_APP_NAME
            
            # Delete App Service Plan
            az appservice plan delete \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name $PLAN_NAME \
              --yes
            
            # Delete Storage Account using tags for precise identification
            STORAGE_ACCOUNTS=$(az storage account list \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "[?tags.Environment=='$ENV' && tags.FunctionApp=='$FUNCTION_APP_NAME'].name" \
              --output tsv)
            
            if [ -n "$STORAGE_ACCOUNTS" ]; then
              for STORAGE in $STORAGE_ACCOUNTS; do
                echo "Deleting storage account: $STORAGE (Environment=$ENV, FunctionApp=$FUNCTION_APP_NAME)"
                az storage account delete \
                  --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                  --name $STORAGE \
                  --yes
              done
            else
              echo "No storage accounts found with Environment=$ENV and FunctionApp=$FUNCTION_APP_NAME tags"
            fi
            
            echo "✅ Cleanup complete for $FUNCTION_APP_NAME"
          else
            echo "Function App $FUNCTION_APP_NAME not found, skipping cleanup"
            remove_keyvault_assignment "$INPUT_PRINCIPAL_ID"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🧹 Environment Cleaned Up\n\nThe ephemeral Azure Functions environment \`${{ steps.set-env.outputs.function-app-name }}\` has been deleted.\n\nAll associated resources (Function App, App Service Plan, Storage Account) have been removed.`
            })
